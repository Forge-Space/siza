name: Bug report
description: Report a reproducible problem that should become tracked delivery work.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Use Discussions for ideas or RFCs. Use this form when the problem is actionable and belongs in the delivery backlog.
  - type: input
    id: affected_scope
    attributes:
      label: Affected repository or scope
      description: Which repository, package, or cross-repo area is impacted?
      placeholder: Forge-Space/siza
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or currently wrong?
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What should happen after this is fixed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction or failing flow
      description: Minimal steps, request flow, or scenario that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, traces, or links to related PRs/issues/discussions.
