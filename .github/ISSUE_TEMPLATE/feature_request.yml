name: Feature request
description: Propose an actionable improvement with a clear outcome and acceptance criteria.
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Use Discussions first if the proposal is still exploratory, controversial, or not ready for implementation.
  - type: input
    id: affected_scope
    attributes:
      label: Affected area
      description: Which Siza product area or subsystem owns this work?
      placeholder: apps/web onboarding
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user, product, or operator problem are we solving?
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What should be true when this ships?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List objective checks for done.
    validations:
      required: true
  - type: input
    id: related_discussion
    attributes:
      label: Related discussion or RFC
      description: Link the upstream GitHub Discussion when one exists.
      placeholder: https://github.com/Forge-Space/siza/discussions/123
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or tradeoffs
      description: Note constraints, non-goals, or known tradeoffs.

