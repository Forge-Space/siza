name: Performance issue
description: Report measurable runtime, UX, or operational performance problems.
title: "[Performance] "
body:
  - type: markdown
    attributes:
      value: |
        Use Discussions if the work is still exploratory.
        Use this form when the issue is actionable and you can describe the observed slowdown or regression.
  - type: input
    id: affected_scope
    attributes:
      label: Affected area
      description: Which Siza area shows the performance problem?
      placeholder: landing page, generate flow, dashboard, billing API
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Performance problem
      description: What is slow, unstable, or resource-heavy?
    validations:
      required: true
  - type: textarea
    id: measurements
    attributes:
      label: Measurements or evidence
      description: Include timings, Lighthouse results, memory/CPU data, traces, or benchmarks when available.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or workload
      description: Minimal steps or workload that demonstrates the issue.
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What target behavior or metric should we reach?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List objective checks or target metrics for done.
    validations:
      required: true
  - type: input
    id: related_discussion
    attributes:
      label: Related discussion or issue
      description: Link upstream context when relevant.

