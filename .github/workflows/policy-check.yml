name: Policy Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  policy-check:
    name: Policy Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run policy check
        continue-on-error: true
        run: |
          if ! command -v forge-policy &>/dev/null && ! npx --yes forge-policy --help &>/dev/null 2>&1; then
            echo "⏳ forge-policy CLI not yet published — skipping"
            exit 0
          fi
          npx forge-policy \
            --policy-dir node_modules/@forgespace/core/patterns/idp/policies \
            --fail-on-block
